

worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}
stream {
        log_format proxy '$remote_addr [$time_local] '
                         '$protocol $status $bytes_sent $bytes_received '
                         '$session_time "$upstream_addr" '
                         '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';
        upstream hst {
                server 192.168.89.20:20020;
                server 192.168.89.20:20020;
        }
        server {
                listen 20020;
                proxy_connect_timeout 1s;
                proxy_pass hst;
        }
       
        upstream 1089 {
                server 192.168.89.20:1089;
        }
        server {
                listen 11089;
                proxy_connect_timeout 1s;
                proxy_pass 1089;
        }
        server {
                listen 11089 udp;
                proxy_connect_timeout 1s;
                proxy_pass 1089;
        }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
  
    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;
    upstream http {
                server 192.168.89.20:8080;
        }
        server {
                listen 18080;
                server_name 192.168.89.20;
                access_log /var/log/nginx/hst_8080_access.log;
        location / {  
     		proxy_pass  http://http;
      		proxy_redirect default;

      		proxy_set_header Host $http_host;
      		proxy_set_header X_Real-IP $remote_addr;

      		proxy_connect_timeout 30;
     		proxy_send_timeout 60;
      		proxy_read_timeout 60;

      		proxy_buffer_size 32k;
      		proxy_buffering on;
      		proxy_buffers 4 128k;
      		proxy_busy_buffers_size 256k;
      		proxy_max_temp_file_size 256k;
    		}      
        }
  upstream hsthttps {
    server 192.168.89.20:8443;
  	}

  server {
    listen  18443 ssl;
    server_name 192.168.89.20;
    #ssl_certificate /etc/nginx/ssl/hst.crt;
    #ssl_certificate_key /etc/nginx/ssl/hst.key;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_prefer_server_ciphers on;
    access_log /var/log/nginx/hst_8443_access.log;

    location / {  
      proxy_pass  https://hsthttps;
      proxy_redirect default;

      proxy_set_header Host $http_host;
      proxy_set_header X_Real-IP $remote_addr;

      proxy_connect_timeout 30;
      proxy_send_timeout 60;
      proxy_read_timeout 60;

      proxy_buffer_size 32k;
      proxy_buffering on;
      proxy_buffers 4 128k;
      proxy_busy_buffers_size 256k;
      proxy_max_temp_file_size 256k;
    }
  } 
#    include /etc/nginx/conf.d/*.conf;
}
